services:
  # Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trend2earn}
      POSTGRES_USER: ${POSTGRES_USER:-trend_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - trend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trend_user} -d ${POSTGRES_DB:-trend2earn}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - trend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # API Service
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      ORACLE_PRIVATE_KEY: ${ORACLE_PRIVATE_KEY}
      REWARD_MINT_ADDRESS: ${REWARD_MINT_ADDRESS}
      ESCROW_ACCOUNT: ${ESCROW_ACCOUNT}
    ports:
      - "3001:3001"
    volumes:
      - ./api/src:/app/src
      - api_dev_data:/app/node_modules
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.trend.local`) || PathPrefix(`/api`)"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

  # Worker Service
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      ORACLE_PRIVATE_KEY: ${ORACLE_PRIVATE_KEY}
      REWARD_MINT_ADDRESS: ${REWARD_MINT_ADDRESS}
      ESCROW_ACCOUNT: ${ESCROW_ACCOUNT}
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # Vector Service
  vector:
    build:
      context: ./vector-service
      dockerfile: Dockerfile.dev
    container_name: vector
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    expose:
      - "8000"
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # Analytics Service
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: analytics
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    expose:
      - "8001"
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python main.py

  # On-chain Indexer
  indexer:
    build:
      context: ./onchain-indexer
      dockerfile: Dockerfile
    container_name: indexer
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # Client
  client:
    build:
      context: ./client-new
      dockerfile: Dockerfile.dev
    container_name: client
    command: bun run dev
    ports:
      - "3000:3000"
    volumes:
      - client_dev_data:/app/node_modules
      - ./client-new:/app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    networks:
      - trend-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`trend.local`) || Host(`localhost`)"
      - "traefik.http.services.client.loadbalancer.server.port=3000"

  # 🌐 Traefik DEV - Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    networks:
      - trend-network
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
    command:
      - --configfile=/etc/traefik/traefik.yml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.trend.local`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

networks:
  trend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  client_dev_data:
  api_dev_data:
