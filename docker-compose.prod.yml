services:
  # Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: trend-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: trend2earn
      POSTGRES_USER: trend_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - trend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trend_user -d trend2earn"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Redis
  redis:
    image: redis:7-alpine
    container_name: trend-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - trend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # API Service
  trend-api:
    build:
      context: ./trend-api
      dockerfile: Dockerfile.prod
    container_name: trend-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trend_user:${POSTGRES_PASSWORD}@postgres:5432/trend2earn
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      ORACLE_PRIVATE_KEY: ${ORACLE_PRIVATE_KEY}
      REWARD_MINT_ADDRESS: ${REWARD_MINT_ADDRESS}
      ESCROW_ACCOUNT: ${ESCROW_ACCOUNT}
    expose:
      - "3001"
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Worker Service
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: trend-worker-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trend_user:${POSTGRES_PASSWORD}@postgres:5432/trend2earn
      REDIS_URL: redis://redis:6379
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
      ORACLE_PRIVATE_KEY: ${ORACLE_PRIVATE_KEY}
      REWARD_MINT_ADDRESS: ${REWARD_MINT_ADDRESS}
      ESCROW_ACCOUNT: ${ESCROW_ACCOUNT}
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Vector Service
  vector-service:
    build:
      context: ./vector-service
      dockerfile: Dockerfile
    container_name: trend-vector-service-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trend_user:${POSTGRES_PASSWORD}@postgres:5432/trend2earn
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    expose:
      - "3002"
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Analytics Service
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: trend-analytics-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://trend_user:${POSTGRES_PASSWORD}@postgres:5432/trend2earn
      REDIS_URL: redis://redis:6379
    expose:
      - "8001"
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # On-chain Indexer
  onchain-indexer:
    build:
      context: ./onchain-indexer
      dockerfile: Dockerfile
    container_name: trend-indexer-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trend_user:${POSTGRES_PASSWORD}@postgres:5432/trend2earn
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      HELIUS_API_KEY: ${HELIUS_API_KEY}
    networks:
      - trend-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Client
  trend-client:
    build:
      context: ./trend-client
      dockerfile: Dockerfile.prod
    container_name: trend-client-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    expose:
      - "3000"
    networks:
      - trend-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: trend-nginx-prod
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    networks:
      - trend-network
    depends_on:
      - trend-client
      - trend-api
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  trend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: